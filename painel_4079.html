<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel — Veronese Transportadora</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap');

  :root {
    --red: #C8121A;
    --red-dark: #A00E14;
    --white: #FFFFFF;
    --bg: #F4F4F4;
    --surface: #FFFFFF;
    --border: #E5E5E5;
    --text: #1A1A1A;
    --muted: #888888;
    --success: #1A7A3C;
    --warning: #D97706;
    --info: #2563EB;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

  header {
    background: var(--red);
    padding: 0;
    box-shadow: 0 2px 8px rgba(200,18,26,0.2);
  }
  .header-inner {
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo-img { height: 38px; width: auto;  }
  .header-divider { width: 1.5px; height: 30px; background: rgba(255,255,255,0.3); flex-shrink: 0; }
  .header-text h1 { font-size: 15px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; color: #fff; }
  .header-text span { font-size: 11px; color: rgba(255,255,255,0.7); }
  .red-stripe { height: 4px; background: var(--red-dark); }

  .btn {
    background: #fff;
    color: var(--red);
    border: none;
    border-radius: 8px;
    padding: 9px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .btn:hover { opacity: 0.88; }
  .btn-outline {
    background: transparent;
    color: #fff;
    border: 1.5px solid rgba(255,255,255,0.5);
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .btn-outline:hover { border-color: #fff; }
  .header-actions { display: flex; gap: 8px; }

  main { padding: 24px; max-width: 1340px; margin: 0 auto; }

  /* CONFIG */
  .config-card {
    background: #fff7f7;
    border: 1.5px solid var(--red);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .config-card .icon { font-size: 26px; flex-shrink: 0; }
  .config-card h3 { font-size: 14px; color: var(--red); font-weight: 700; margin-bottom: 6px; }
  .config-card p { font-size: 13px; color: #666; line-height: 1.6; }
  .config-inputs { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  .config-inputs input {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 9px 12px;
    outline: none;
    flex: 1;
    min-width: 200px;
    transition: border-color 0.2s;
  }
  .config-inputs input:focus { border-color: var(--red); }
  .config-inputs .btn-red {
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 20px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 12px; margin-bottom: 22px; }
  .stat-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .stat-card.accent { border-color: var(--red); border-width: 2px; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.09em; font-weight: 700; margin-bottom: 5px; }
  .stat-value { font-size: 30px; font-weight: 800; font-family: 'JetBrains Mono', monospace; color: var(--red); }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* FILTERS */
  .filters { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }
  .search-box {
    flex: 1; min-width: 200px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .search-box:focus { border-color: var(--red); }
  select.fs {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    cursor: pointer;
    -webkit-appearance: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  select.fs:focus { border-color: var(--red); }

  /* TABLE */
  .table-wrap {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  }
  .table-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #FAFAFA;
  }
  .table-header h2 { font-size: 14px; font-weight: 700; }
  .record-count { font-size: 12px; color: var(--muted); }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    background: #F5F5F5;
    padding: 11px 16px;
    text-align: left;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
    border-bottom: 1.5px solid var(--border);
  }
  td { padding: 13px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #FFF8F8; }

  .foto-thumb { width: 46px; height: 46px; border-radius: 8px; object-fit: cover; border: 2px solid var(--border); cursor: pointer; transition: transform 0.18s; }
  .foto-thumb:hover { transform: scale(1.12); border-color: var(--red); }
  .no-foto { width: 46px; height: 46px; border-radius: 8px; background: #F4F4F4; border: 1.5px dashed #CCC; display: flex; align-items: center; justify-content: center; font-size: 17px; }

  .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .badge-otimo { background: #E6F4EC; color: #1A7A3C; }
  .badge-bom { background: #EEF4FF; color: #2563EB; }
  .badge-regular { background: #FEF3C7; color: #D97706; }
  .badge-ruim { background: #FEE2E2; color: #C8121A; }
  .badge-inativo { background: #F3F4F6; color: #6B7280; }
  .badge-uso { background: #E6F4EC; color: #1A7A3C; }
  .badge-manutencao { background: #FEF3C7; color: #D97706; }
  .badge-ocioso { background: #F3F4F6; color: #6B7280; }
  .badge-sucata { background: #FEE2E2; color: #C8121A; }

  .id-code { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--red); font-weight: 500; }

  .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }
  .spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { text-align: center; padding: 60px; color: var(--muted); }
  .empty .icon { font-size: 44px; margin-bottom: 10px; }
  .empty h3 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .empty p { font-size: 13px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.82); z-index: 999; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal-overlay img { max-width: 100%; max-height: 90vh; border-radius: 12px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
  .modal-close { position: absolute; top: 20px; right: 20px; background: var(--red); color: #fff; border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 18px; cursor: pointer; font-weight: 700; }

  @media (max-width: 768px) {
    main { padding: 14px; }
    table { display: none; }
    .cards-mobile { display: block !important; }
  }
  .cards-mobile { display: none; }
  .mob-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .mob-card-header { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 8px; }
  .mob-card-body { font-size: 13px; line-height: 1.8; color: var(--muted); }
  .mob-card-body strong { color: var(--text); }
</style>
</head>

<script>
  const SUPABASE_URL = 'https://kmjlpqhcszgbxwdkgbes.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_PokGuW4MvRe3_HCSq5cdrw_eci2RXfN';
  let todosRegistros = [];
  let registrosFiltrados = [];

  async function carregarDados() {
    if (!SUPABASE_URL || !SUPABASE_KEY) return;
    document.getElementById('tableContainer').innerHTML = '<div class="loading"><div class="spinner"></div>Carregando registros...</div>';
    try {
      const res = await fetch(SUPABASE_URL + '/rest/v1/inventario?order=criado_em.desc', {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      });
      todosRegistros = await res.json();
      registrosFiltrados = [...todosRegistros];
      atualizarStats();
      renderTabela();
    } catch(e) {
      document.getElementById('tableContainer').innerHTML = '<div class="empty"><div class="icon">❌</div><h3>Erro ao carregar</h3><p>Verifique suas credenciais</p></div>';
    }
  }

  function atualizarStats() {
    const total = todosRegistros.length;
    const comFoto = todosRegistros.filter(r => r.foto_url).length;
    const emUso = todosRegistros.filter(r => r.situacao_uso === 'Em operação').length;
    const problema = todosRegistros.filter(r => ['Em manutenção','Inativo','Aguardando sucata'].includes(r.situacao_uso)).length;
    let valorTotal = 0;
    todosRegistros.forEach(r => {
      if (r.valor_aquisicao) { const v = parseFloat(r.valor_aquisicao.replace(/\./g,'').replace(',','.')); if (!isNaN(v)) valorTotal += v; }
    });
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statFotos').textContent = comFoto;
    document.getElementById('statEmUso').textContent = emUso;
    document.getElementById('statProblema').textContent = problema;
    document.getElementById('statValor').textContent = 'R$ ' + valorTotal.toLocaleString('pt-BR', {minimumFractionDigits:0, maximumFractionDigits:0});
  }

  function filtrar() {
    const busca = document.getElementById('searchBox').value.toLowerCase();
    const cat = document.getElementById('filterCategoria').value;
    const est = document.getElementById('filterEstado').value;
    registrosFiltrados = todosRegistros.filter(r => {
      const mb = !busca || (r.descricao||'').toLowerCase().includes(busca) || (r.obra||'').toLowerCase().includes(busca) || (r.num_patrimonio||'').toLowerCase().includes(busca) || (r.num_serie||'').toLowerCase().includes(busca) || (r.inventariante||'').toLowerCase().includes(busca);
      const mc = !cat || r.categoria === cat;
      const me = !est || r.estado === est;
      return mb && mc && me;
    });
    renderTabela();
  }

  function badgeEstado(e) {
    const m = {'Ótimo':'otimo','Bom':'bom','Regular':'regular','Ruim':'ruim','Inativo':'inativo'};
    return '<span class="badge badge-' + (m[e]||'bom') + '">' + (e||'—') + '</span>';
  }
  function badgeUso(u) {
    const m = {'Em operação':'uso','Em manutenção':'manutencao','Ocioso':'ocioso','Aguardando sucata':'sucata'};
    return '<span class="badge badge-' + (m[u]||'uso') + '">' + (u||'—') + '</span>';
  }
  function formatData(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('pt-BR');
  }

  function renderTabela() {
    const count = registrosFiltrados.length;
    document.getElementById('recordCount').textContent = count + ' registro' + (count !== 1 ? 's' : '');
    if (count === 0) {
      document.getElementById('tableContainer').innerHTML = '<div class="empty"><div class="icon">📭</div><h3>Nenhum registro encontrado</h3><p>Ajuste os filtros ou adicione registros pelo formulário</p></div>';
      return;
    }

    let html = '<table><thead><tr><th>Foto</th><th>Registro</th><th>Descrição</th><th>Placa/Série</th><th>Categoria</th><th>Filial / Base</th><th>Estado</th><th>Situação</th><th>Valor</th><th>Data</th><th>Inventariante</th></tr></thead><tbody>';
    registrosFiltrados.forEach(r => {
      
let fotosHtml = '<div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center">';

if (r.foto_url) {
  const fotos = r.foto_url.split(',');

  fotos.forEach(url => {
    fotosHtml += `<img class="foto-thumb" src="${url}" onclick="abrirFoto('${url}')">`;
  });
} else {
  fotosHtml += '<div class="no-foto">📷</div>';
}

fotosHtml += '</div>';

      html += '<tr>';
      const btnFoto = r.foto_url
        ? '<button onclick="baixarFoto(\'' + r.foto_url + '\',\'' + (r.registro_id||'foto') + '\')" title="Baixar foto" style="background:var(--red);border:none;border-radius:6px;color:#fff;font-size:12px;padding:4px 8px;cursor:pointer;margin-top:4px;display:block;width:46px">⬇️</button>'
        : '';
      html += '<td><div style="display:flex;flex-direction:column;align-items:center;gap:2px">' + fotosHtml + btnFoto + '</div></td>';
      html += '<td><span class="id-code">' + (r.registro_id||'—') + '</span></td>';
      html += '<td style="max-width:180px;font-weight:600">' + (r.descricao||'—') + '</td>';
      html += '<td><span class="id-code" style="color:#555">' + (r.num_serie||r.num_patrimonio||'—') + '</span></td>';
      html += '<td style="color:#777;font-size:12px;max-width:160px">' + (r.categoria||'—') + '</td>';
      html += '<td><div style="font-weight:600">' + (r.obra||'—') + '</div>' + (r.setor ? '<div style="font-size:11px;color:#999">' + r.setor + '</div>' : '') + '</td>';
      html += '<td>' + badgeEstado(r.estado) + '</td>';
      html += '<td>' + badgeUso(r.situacao_uso) + '</td>';
      html += '<td style="font-family:JetBrains Mono,monospace;font-size:12px;white-space:nowrap">' + (r.valor_aquisicao ? 'R$ ' + r.valor_aquisicao : '—') + '</td>';
      html += '<td style="font-size:12px;color:#999;white-space:nowrap">' + formatData(r.criado_em) + '</td>';
      html += '<td style="font-size:12px">' + (r.inventariante||'—') + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';

    html += '<div class="cards-mobile">';
    registrosFiltrados.forEach(r => {
      html += '<div class="mob-card"><div class="mob-card-header">';
      if (r.foto_url) { const fotos = r.foto_url.split(','); html += '<div style="display:flex;gap:4px;flex-wrap:wrap">' + fotos.map(url => `<img class="foto-thumb" src="${url}" onclick="abrirFoto(\'${url}\')">`).join('') + '</div>'; } else { html += '<div class="no-foto">📷</div>'; }
      html += '<div style="flex:1"><div style="font-weight:700;font-size:14px">' + (r.descricao||'—') + '</div>';
      html += '<div class="id-code" style="font-size:11px">' + (r.registro_id||'') + '</div>';
      html += '<div style="margin-top:4px">' + badgeEstado(r.estado) + ' ' + badgeUso(r.situacao_uso) + '</div></div></div>';
      html += '<div class="mob-card-body">';
      html += '<strong>Filial:</strong> ' + (r.obra||'—') + '<br>';
      if (r.setor) html += '<strong>Setor:</strong> ' + r.setor + '<br>';
      html += '<strong>Categoria:</strong> ' + (r.categoria||'—') + '<br>';
      if (r.num_serie) html += '<strong>Placa/Série:</strong> ' + r.num_serie + '<br>';
      if (r.valor_aquisicao) html += '<strong>Valor:</strong> R$ ' + r.valor_aquisicao + '<br>';
      html += '<strong>Inventariante:</strong> ' + (r.inventariante||'—') + '<br>';
      if (r.observacoes) html += '<strong>Obs:</strong> ' + r.observacoes;
      html += '</div></div>';
    });
    html += '</div>';

    document.getElementById('tableContainer').innerHTML = html;
  }

  function abrirFoto(url) {
    document.getElementById('modalImg').src = url;
    document.getElementById('modalFoto').classList.add('open');
  }
  function fecharModal() { document.getElementById('modalFoto').classList.remove('open'); }

  async function baixarFoto(url, registroId) {
    try {
      const res = await fetch(url);
      const blob = await res.blob();
      const ext = url.split('.').pop().split('?')[0] || 'jpg';
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'foto_' + registroId + '.' + ext;
      a.click();
    } catch(e) {
      alert('Erro ao baixar a foto. Tente pelo botão direito → Salvar imagem.');
    }
  }

  async function baixarTodasFotos() {
    const comFoto = registrosFiltrados.filter(r => r.foto_url);
    if (comFoto.length === 0) { alert('Nenhum registro com foto nos resultados atuais.'); return; }

    const btn = document.getElementById('btnTodasFotos');
    btn.disabled = true;
    btn.textContent = '⏳ Baixando...';

    let ok = 0;
    for (const r of comFoto) {
      try {
        const res = await fetch(r.foto_url);
        const blob = await res.blob();
        const ext = r.foto_url.split('.').pop().split('?')[0] || 'jpg';
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'foto_' + (r.registro_id||'item') + '_' + (r.descricao||'').substring(0,20).replace(/[^a-zA-Z0-9]/g,'_') + '.' + ext;
        a.click();
        ok++;
        btn.textContent = '⏳ ' + ok + '/' + comFoto.length;
        await new Promise(res => setTimeout(res, 600));
      } catch(e) { /* ignora erros individuais */ }
    }

    btn.disabled = false;
    btn.textContent = '🖼️ Baixar Todas as Fotos';
    alert('✅ ' + ok + ' foto(s) baixada(s) com sucesso!');
  }

  function exportCSV() {
    if (registrosFiltrados.length === 0) { alert('Nenhum dado para exportar'); return; }
    const cols = ['registro_id','descricao','num_patrimonio','num_serie','categoria','obra','setor','responsavel','estado','situacao_uso','data_aquisicao','valor_aquisicao','fornecedor','observacoes','inventariante','foto_url','criado_em'];
    const header = ['Registro','Descrição','Nº Patrimônio','Placa/Série','Categoria','Filial/Base','Setor','Responsável','Estado','Situação Uso','Data Aquisição','Valor','Fornecedor/Modelo','Observações','Inventariante','URL Foto','Data Registro'];
    let csv = header.join(';') + '\n';
    registrosFiltrados.forEach(r => { csv += cols.map(c => '"' + (r[c]||'').toString().replace(/"/g,'""') + '"').join(';') + '\n'; });
    const blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'inventario_veronese_' + new Date().toLocaleDateString('pt-BR').replace(/\//g,'-') + '.csv';
    a.click();
  }

  window.addEventListener('load', () => {
    document.getElementById('statsGrid').style.display = 'grid';
    document.getElementById('filtersRow').style.display = 'flex';
    document.getElementById('tableWrap').style.display = 'block';
    carregarDados();
  });
</script>
</body>
</html>
